version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobfor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - jobfor_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - jobfor_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobfor_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      GROQ_API_KEY: ${GROQ_API_KEY}
      UPLOAD_DIR: ${UPLOAD_DIR}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    volumes:
      - ./backend:/app
      - jobfor_uploads:/app/uploads
    ports:
      - "8000:8000"
    networks:
      - jobfor_network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobfor_frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_API_MODE=${VITE_API_MODE}
      - VITE_DOCKER=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - jobfor_network
    depends_on:
      - backend

volumes:
  jobfor_postgres_data:
    name: jobfor_postgres_data
  jobfor_uploads:
    name: jobfor_uploads

networks:
  jobfor_network:
    name: jobfor_network
    driver: bridge
